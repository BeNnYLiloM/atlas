port: 7880
rtc:
  tcp_port: 7881
  use_external_ip: false
  # Для локальной разработки: браузер подключается через localhost
  # На проде заменить на публичный IP сервера или use_external_ip: true
  node_ip: 127.0.0.1
  port_range_start: 50000
  port_range_end: 60000

redis:
  address: redis:6379

keys:
  # ВАЖНО: заменить на длинный случайный ключ на проде!
  # Генерация: openssl rand -hex 32
  devkey: secret_replace_in_production_min_32_chars!!

logging:
  level: info

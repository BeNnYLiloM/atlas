port: 7880
rtc:
  tcp_port: 7881
  use_external_ip: false
  node_ip: 192.168.0.59
  # Не указываем UDP диапазон — на Windows Docker Desktop он не пробрасывается
  # LiveKit будет использовать TCP ICE (порт 7881) как fallback
  stun_servers:
    - stun:stun.l.google.com:19302
    - stun:stun1.l.google.com:19302

redis:
  address: redis:6379

keys:
  devkey: secret_replace_in_production_min_32_chars!!

logging:
  level: info
